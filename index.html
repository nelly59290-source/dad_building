<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1f2a44">
<title>원룸 관리</title>
<style>
  :root{
    --bg:#eef0f3;
    --surface:#ffffff;
    --ink:#171a21;
    --ink-soft:#646b78;
    --line:#e2e5ea;
    --brand:#1f2a44;
    --brand-soft:#e9ecf4;
    --paid:#1c8a4e;
    --paid-soft:#e6f4ec;
    --unpaid:#cf4634;
    --unpaid-soft:#fbeae6;
    --warn:#bd7a13;
    --warn-soft:#fbf1de;
    --vacant:#8a909c;
    --vacant-soft:#eef0f3;
    --radius:16px;
    --shadow:0 1px 2px rgba(20,25,40,.05), 0 4px 16px rgba(20,25,40,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
    font-feature-settings:"tnum";
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit}
  .tnum{font-variant-numeric:tabular-nums}

  /* ---------- Lock ---------- */
  #lockScreen{
    position:fixed;inset:0;background:var(--brand);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 24px;color:#fff;z-index:100;
  }
  #lockScreen h1{font-size:22px;font-weight:700;margin:0 0 4px;letter-spacing:-.02em}
  #lockSub{font-size:14px;color:#aeb6cc;margin-bottom:40px;text-align:center;line-height:1.5}
  .pinDots{display:flex;gap:16px;margin-bottom:36px;height:18px}
  .pinDot{width:14px;height:14px;border-radius:50%;border:2px solid #67708f;transition:.15s}
  .pinDot.on{background:#fff;border-color:#fff}
  .pinDot.err{border-color:var(--unpaid);background:var(--unpaid)}
  .keypad{display:grid;grid-template-columns:repeat(3,76px);gap:18px}
  .key{
    width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.08);
    color:#fff;font-size:28px;font-weight:500;display:flex;align-items:center;justify-content:center;
    transition:.1s;user-select:none;
  }
  .key:active{background:rgba(255,255,255,.22);transform:scale(.95)}
  .key.fn{background:transparent;font-size:15px;color:#aeb6cc}
  .key.fn:active{background:rgba(255,255,255,.08)}
  #lockHint{margin-top:28px;font-size:13px;color:#aeb6cc;min-height:18px}

  /* ---------- Layout ---------- */
  #mainScreen{max-width:560px;margin:0 auto;padding-bottom:96px}
  header.appbar{
    position:sticky;top:0;z-index:20;background:var(--brand);color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    display:flex;align-items:center;justify-content:space-between;
  }
  header.appbar .title{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .iconbtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff}
  .iconbtn:active{background:rgba(255,255,255,.14)}
  .iconbtn svg{width:22px;height:22px}

  /* month + building bar */
  .controls{padding:16px 16px 4px}
  .monthnav{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
  .monthnav button{width:38px;height:38px;border-radius:12px;background:var(--surface);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .monthnav button:active{background:var(--brand-soft)}
  .monthnav .mlabel{font-size:17px;font-weight:700;min-width:120px;text-align:center}
  .monthnav .today{font-size:12px;color:var(--ink-soft);padding:6px 10px}

  .segment{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .segment::-webkit-scrollbar{display:none}
  .seg{
    flex:0 0 auto;padding:9px 16px;border-radius:999px;background:var(--surface);
    font-size:14px;font-weight:600;color:var(--ink-soft);box-shadow:var(--shadow);white-space:nowrap;
  }
  .seg.on{background:var(--brand);color:#fff}

  /* summary */
  .summary{margin:14px 16px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .sumtop{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
  .sumtop .lbl{font-size:13px;color:var(--ink-soft);font-weight:600}
  .sumtop .big{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .sumtop .big small{font-size:15px;font-weight:600;color:var(--ink-soft);margin-left:2px}
  .progbar{height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin-bottom:14px}
  .progbar i{display:block;height:100%;background:var(--paid);border-radius:99px;transition:width .35s}
  .sumstats{display:flex;gap:10px}
  .stat{flex:1;text-align:center;padding:10px 6px;border-radius:12px;background:var(--bg)}
  .stat .n{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .stat .t{font-size:11px;color:var(--ink-soft);margin-top:2px;font-weight:600}
  .stat.unpaid .n{color:var(--unpaid)}
  .stat.paid .n{color:var(--paid)}

  /* filter chips */
  .filters{display:flex;gap:8px;padding:0 16px 4px}
  .chip{padding:7px 13px;border-radius:999px;background:var(--surface);font-size:13px;font-weight:600;color:var(--ink-soft);box-shadow:var(--shadow)}
  .chip.on{background:var(--ink);color:#fff}

  /* room cards */
  .roomwrap{padding:8px 16px}
  .bldhead{font-size:13px;font-weight:700;color:var(--ink-soft);padding:14px 4px 8px;display:flex;justify-content:space-between;align-items:center}
  .bldhead .addr{font-weight:500;font-size:12px}
  .card{
    background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px 15px;margin-bottom:10px;display:flex;align-items:center;gap:13px;
    position:relative;overflow:hidden;
  }
  .card .stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .card.s-paid .stripe{background:var(--paid)}
  .card.s-unpaid .stripe{background:var(--unpaid)}
  .card.s-vacant .stripe{background:var(--vacant)}
  .roomno{
    flex:0 0 56px;height:56px;border-radius:13px;background:var(--brand-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .roomno .no{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--brand)}
  .roomno .ty{font-size:10px;color:var(--ink-soft);font-weight:600;margin-top:1px}
  .cardmid{flex:1;min-width:0}
  .cardmid .nm{font-size:16px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:6px}
  .cardmid .nm .vacbadge{font-size:11px;font-weight:700;color:var(--vacant);background:var(--vacant-soft);padding:2px 7px;border-radius:6px}
  .cardmid .rent{font-size:14px;color:var(--ink);font-weight:600;margin-top:3px}
  .cardmid .rent .dep{color:var(--ink-soft);font-weight:500;font-size:12px;margin-left:6px}
  .cardmid .meta{font-size:12px;color:var(--ink-soft);margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 8px;align-items:center}
  .expire{font-weight:600}
  .expire.soon{color:var(--warn);background:var(--warn-soft);padding:1px 6px;border-radius:5px}
  .expire.over{color:var(--vacant)}
  .note{color:var(--brand);background:var(--brand-soft);padding:1px 6px;border-radius:5px;font-weight:600}
  .arrears{margin-top:5px;display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:var(--unpaid);background:var(--unpaid-soft);padding:4px 10px;border-radius:8px;letter-spacing:-.01em}
  .arrears.one{color:var(--warn);background:var(--warn-soft)}
  .arrears svg{width:14px;height:14px}
  .paybtn{
    flex:0 0 auto;width:64px;height:56px;border-radius:13px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-weight:700;font-size:13px;gap:2px;transition:.12s;
  }
  .paybtn:active{transform:scale(.94)}
  .paybtn.unpaid{background:var(--unpaid-soft);color:var(--unpaid)}
  .paybtn.paid{background:var(--paid-soft);color:var(--paid)}
  .paybtn svg{width:18px;height:18px}
  .paybtn .pdt{font-size:9px;font-weight:600;opacity:.85}
  .emptymsg{text-align:center;color:var(--ink-soft);font-size:14px;padding:48px 16px;line-height:1.6}

  /* FAB */
  .fab{
    position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 20px);
    background:var(--brand);color:#fff;padding:14px 22px;border-radius:999px;
    font-size:15px;font-weight:700;box-shadow:0 6px 20px rgba(31,42,68,.35);
    display:flex;align-items:center;gap:7px;z-index:30;
  }
  .fab:active{transform:translateX(-50%) scale(.96)}
  .fab svg{width:20px;height:20px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,25,40,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{
    position:relative;
    background:var(--surface);width:100%;max-width:560px;border-radius:22px 22px 0 0;
    max-height:92vh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    padding:0 20px calc(env(safe-area-inset-bottom) + 24px);
    animation:slideup .25s ease;
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheethead{position:sticky;top:0;z-index:5;background:var(--surface);height:48px;margin:0 -20px 4px}
  .grab{position:absolute;left:50%;top:9px;transform:translateX(-50%);width:40px;height:5px;border-radius:99px;background:var(--line)}
  .sheetback{position:absolute;left:8px;top:7px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .sheetback svg{width:24px;height:24px}
  .sheetback:active{background:var(--bg)}
  body.noscroll{overflow:hidden}
  .sheet h2{font-size:19px;font-weight:800;margin:4px 0 18px;letter-spacing:-.02em}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
  .field input,.field select{
    width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:16px;background:var(--surface);color:var(--ink);
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--brand)}
  .row2{display:flex;gap:12px}
  .row2>.field{flex:1}
  .seg-in{display:flex;gap:6px;flex-wrap:wrap}
  .seg-in button{padding:9px 13px;border-radius:10px;background:var(--bg);font-size:14px;font-weight:600;color:var(--ink-soft)}
  .seg-in button.on{background:var(--brand);color:#fff}
  .btnrow{display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;padding:15px;border-radius:13px;font-size:16px;font-weight:700;text-align:center}
  .btn.primary{background:var(--brand);color:#fff}
  .btn.ghost{background:var(--bg);color:var(--ink)}
  .btn.danger{background:var(--unpaid-soft);color:var(--unpaid)}
  .btn:active{opacity:.85}
  .menuitem{display:flex;align-items:center;gap:14px;padding:16px 4px;font-size:16px;font-weight:600;border-bottom:1px solid var(--line)}
  .menuitem:last-child{border-bottom:none}
  .menuitem svg{width:22px;height:22px;color:var(--ink-soft)}
  .menuitem .sub{font-size:12px;color:var(--ink-soft);font-weight:500;margin-top:2px}
  .callbtn{display:inline-flex;align-items:center;gap:4px;color:var(--brand);font-weight:600;font-size:13px}
  .toast{
    position:fixed;left:50%;transform:translateX(-50%);bottom:100px;background:var(--ink);color:#fff;
    padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:.25s;pointer-events:none;
  }
  .toast.show{opacity:1;bottom:120px}
</style>
</head>
<body>

<!-- ============ LOCK (현재 비활성화 — 기본 숨김) ============ -->
<!-- CSS #lockScreen{display:flex} 가 [hidden]를 이기므로 인라인 display:none 으로 확실히 숨김 -->
<div id="lockScreen" hidden style="display:none">
  <h1 id="lockTitle">원룸 관리</h1>
  <div id="lockSub">비밀번호를 입력하세요</div>
  <div class="pinDots" id="pinDots"></div>
  <div class="keypad" id="keypad"></div>
  <div id="lockHint"></div>
</div>

<!-- ============ MAIN ============ -->
<div id="mainScreen">
  <header class="appbar">
    <div class="title">원룸 관리</div>
    <button class="iconbtn" id="menuBtn" aria-label="메뉴">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
    </button>
  </header>

  <div class="controls">
    <div class="monthnav">
      <button id="prevM" aria-label="이전 달"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="mlabel" id="mLabel">2026년 6월</div>
      <button id="nextM" aria-label="다음 달"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <div class="segment" id="bldSeg"></div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="filters">
    <button class="chip on" data-f="all" id="fAll">전체</button>
    <button class="chip" data-f="unpaid" id="fUnpaid">미납만</button>
    <button class="chip" data-f="expire" id="fExpire">만료임박</button>
  </div>

  <div class="roomwrap" id="roomList"></div>

  <button class="fab" id="addRoomFab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    호실 추가
  </button>
</div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============================================================
   DB : 전체 상태를 IndexedDB 한 레코드에 저장 (단일 사용자 앱)
   ============================================================ */
const DB_NAME='oneroom-db', STORE='kv', KEY='state';
let db=null, state=null, memMode=false;
const mem={};

function openDB(){
  return new Promise((res,rej)=>{
    try{
      if(!window.indexedDB){ rej(new Error('no-idb')); return; }
      const r=indexedDB.open(DB_NAME,1);
      r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains(STORE)) r.result.createObjectStore(STORE); };
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>rej(r.error||new Error('idb-error'));
      r.onblocked=()=>rej(new Error('idb-blocked'));
    }catch(e){ rej(e); }
  });
}
function dbGet(key){
  if(memMode) return Promise.resolve(mem[key]);
  return new Promise((res,rej)=>{
    const t=db.transaction(STORE,'readonly').objectStore(STORE).get(key);
    t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);
  });
}
function dbPut(key,val){
  if(memMode){ mem[key]=val; return Promise.resolve(); }
  return new Promise((res,rej)=>{
    const t=db.transaction(STORE,'readwrite').objectStore(STORE).put(val,key);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
  });
}
async function saveState(){ try{ await dbPut(KEY, state); }catch(e){ console.error('save fail',e); toast('저장에 실패했어요'); } }

/* ============================================================
   Crypto : PIN 해시 (SHA-256 + salt)
   ============================================================ */
async function sha256(str){
  if(typeof crypto!=='undefined' && crypto.subtle){
    try{
      const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }catch(e){ /* 비보안 컨텍스트 등: 아래 JS 구현으로 대체 */ }
  }
  return sha256js(str);
}
// crypto.subtle을 못 쓰는 환경(file:// 등)을 위한 순수 JS SHA-256 (표준과 동일 결과)
function sha256js(input){
  function rotr(n,x){ return (x>>>n)|(x<<(32-n)); }
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let h=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const bytes=Array.from(new TextEncoder().encode(input));
  const l=bytes.length;
  bytes.push(0x80);
  while(bytes.length%64!==56) bytes.push(0);
  const hi=Math.floor(l*8/0x100000000), lo=(l*8)>>>0;
  bytes.push((hi>>>24)&0xff,(hi>>>16)&0xff,(hi>>>8)&0xff,hi&0xff,(lo>>>24)&0xff,(lo>>>16)&0xff,(lo>>>8)&0xff,lo&0xff);
  for(let i=0;i<bytes.length;i+=64){
    const w=new Array(64);
    for(let t=0;t<16;t++) w[t]=(bytes[i+t*4]<<24)|(bytes[i+t*4+1]<<16)|(bytes[i+t*4+2]<<8)|(bytes[i+t*4+3]);
    for(let t=16;t<64;t++){
      const s0=rotr(7,w[t-15])^rotr(18,w[t-15])^(w[t-15]>>>3);
      const s1=rotr(17,w[t-2])^rotr(19,w[t-2])^(w[t-2]>>>10);
      w[t]=(w[t-16]+s0+w[t-7]+s1)|0;
    }
    let [a,b,c,d,e,f,g,hh]=h;
    for(let t=0;t<64;t++){
      const S1=rotr(6,e)^rotr(11,e)^rotr(25,e);
      const ch=(e&f)^(~e&g);
      const temp1=(hh+S1+ch+K[t]+w[t])|0;
      const S0=rotr(2,a)^rotr(13,a)^rotr(22,a);
      const maj=(a&b)^(a&c)^(b&c);
      const temp2=(S0+maj)|0;
      hh=g;g=f;f=e;e=(d+temp1)|0;d=c;c=b;b=a;a=(temp1+temp2)|0;
    }
    h[0]=(h[0]+a)|0;h[1]=(h[1]+b)|0;h[2]=(h[2]+c)|0;h[3]=(h[3]+d)|0;
    h[4]=(h[4]+e)|0;h[5]=(h[5]+f)|0;h[6]=(h[6]+g)|0;h[7]=(h[7]+hh)|0;
  }
  return h.map(x=>(x>>>0).toString(16).padStart(8,'0')).join('');
}
function randSalt(){ return [...crypto.getRandomValues(new Uint8Array(16))].map(b=>b.toString(16).padStart(2,'0')).join(''); }

/* ============================================================
   Seed : 빈 상태로 시작 (데이터는 백업 불러오기로 주입)
   ============================================================ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function mkRoom(no,type,deposit,rent,start,end,tenant,note){
  return { id:uid(), no, type, deposit, rent, tenant:tenant||'', phone:'',
           startDate:start||'', endDate:end||'', note:note||'',
           vacant: !tenant, payments:{} };
}
function seedState(){
  // 배포 코드에는 개인정보를 넣지 않는다. 빈 상태로 시작하고
  // 실제 데이터는 메뉴 → 백업 불러오기로 주입한다.
  return { version:1, pin:null, buildings:[] };
}

/* ============================================================
   상태 헬퍼
   ============================================================ */
const ROOM_TYPES=['원룸','투룸','미투','쓰룸','주인','기타'];
let selMonth = ymOfDate(new Date());   // 'YYYY-MM'
let selBld = 'all';                     // 빌라 id 또는 'all'
let filter = 'all';                     // all | unpaid | expire

function ymOfDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function fmtMonth(ym){ const [y,m]=ym.split('-'); return `${y}년 ${parseInt(m)}월`; }
function won(n){ return (n||0).toLocaleString('ko-KR'); }
function allRooms(){ return state.buildings.flatMap(b=>b.rooms.map(r=>({...r,_bld:b}))); }
function findRoom(id){
  for(const b of state.buildings){ const r=b.rooms.find(x=>x.id===id); if(r) return {room:r,bld:b}; }
  return null;
}
function isPaid(room,ym){ return !!(room.payments && room.payments[ym] && room.payments[ym].paid); }

/* 계약 만료 상태: {label, cls} */
function expireInfo(room){
  if(room.vacant||!room.endDate) return null;
  const end=new Date(room.endDate+'T00:00:00');
  const today=new Date(); today.setHours(0,0,0,0);
  const days=Math.round((end-today)/86400000);
  if(days<0) return {label:`만료됨 ${room.endDate.replace(/-/g,'.')}`, cls:'over'};
  if(days<=30) return {label:`만료 D-${days}`, cls:'soon'};
  return {label:`~${room.endDate.replace(/-/g,'.')}`, cls:''};
}

/* 누적 미납 개월수: selMonth부터 과거로 연속 미납을 센다.
   하한선 = 계약 시작월(없으면 기록된 가장 이른 납부월). 둘 다 없으면 해당 월만(1). */
function unpaidStreak(room, ym){
  if(room.vacant || isPaid(room,ym)) return 0;
  let lb = room.startDate ? room.startDate.slice(0,7) : null;
  if(!lb){
    const keys=Object.keys(room.payments||{});
    if(keys.length) lb=keys.sort()[0];
  }
  let count=0, [y,m]=ym.split('-').map(Number);
  for(let i=0;i<120;i++){
    const cur=y+'-'+String(m).padStart(2,'0');
    if(isPaid(room,cur)) break;
    count++;
    if(!lb || cur<=lb) break;   // 기준점 없음 → 해당 월만 / 계약 시작월 도달 시 종료
    m--; if(m===0){ m=12; y--; }
  }
  return count;
}

function visibleBuildings(){
  return selBld==='all' ? state.buildings : state.buildings.filter(b=>b.id===selBld);
}

function renderSummary(){
  const blds=visibleBuildings();
  let occupied=0, total=0, due=0, got=0, unpaidCnt=0;
  blds.forEach(b=>b.rooms.forEach(r=>{
    total++;
    if(r.vacant) return;
    occupied++; due+=r.rent;
    if(isPaid(r,selMonth)){ got+=r.rent; } else { unpaidCnt++; }
  }));
  const pct = due? Math.round(got/due*100) : 0;
  document.getElementById('summary').innerHTML=`
    <div class="sumtop">
      <div>
        <div class="lbl">${fmtMonth(selMonth)} 수금</div>
        <div class="big tnum">${won(got)}<small>원</small></div>
      </div>
      <div style="text-align:right">
        <div class="lbl">받을 월세</div>
        <div class="big tnum" style="font-size:18px;color:var(--ink-soft)">${won(due)}<small>원</small></div>
      </div>
    </div>
    <div class="progbar"><i style="width:${pct}%"></i></div>
    <div class="sumstats">
      <div class="stat"><div class="n">${total}</div><div class="t">전체 호실</div></div>
      <div class="stat paid"><div class="n">${occupied-unpaidCnt}</div><div class="t">납부 완료</div></div>
      <div class="stat unpaid"><div class="n">${unpaidCnt}</div><div class="t">미납</div></div>

function renderList(){

    if(filter==='expire') rooms=rooms.filter(r=>{ const e=expireInfo(r); return e&&(e.cls==='soon'||e.cls==='over'); });
    if(rooms.length===0) return;
    html+=`<div class="bldhead">${esc(b.name)} <span class="addr">${esc(b.address||'')}</span></div>`;
    rooms.forEach(r=>{ shown++; html+=roomCard(r); });
  });

              : filter==='expire' ? '만료 임박이거나 만료된 계약이 없어요'
              : '호실이 없어요. 아래 버튼으로 추가하세요';
    html=`<div class="emptymsg">${msg}</div>`;
  }
  wrap.innerHTML=html;
  wrap.querySelectorAll('[data-room]').forEach(el=>{
    el.querySelector('.paybtn')?.addEventListener('click',ev=>{ ev.stopPropagation(); togglePay(el.dataset.room); });
    el.addEventListener('click',()=>openRoomEdit(el.dataset.room));
  });
}

function roomCard(r){
  const paid=isPaid(r,selMonth);
  const exp=expireInfo(r);
  let stateCls = r.vacant ? 's-vacant' : (paid?'s-paid':'s-unpaid');
  let payBtn;
  if(r.vacant){
    payBtn=`<div class="paybtn" style="background:var(--vacant-soft);color:var(--vacant)">공실</div>`;
  }else if(paid){
    const dt=r.payments[selMonth]?.date;
    payBtn=`<div class="paybtn paid">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      완납${dt?`<span class="pdt">${dt.slice(5).replace('-','.')}</span>`:''}</div>`;
  }else{
    payBtn=`<div class="paybtn unpaid">미납<span class="pdt">탭하면 완납</span></div>`;
  }
  const meta=[];
  if(exp) meta.push(`<span class="expire ${exp.cls}">${exp.label}</span>`);
  if(r.note) meta.push(`<span class="note">${esc(r.note)}</span>`);
  let arrears='';
  if(!r.vacant && !paid){
    const st=unpaidStreak(r,selMonth);
    const warnIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>`;
    if(st>=2) arrears=`<div class="arrears">${warnIcon}${st}개월 밀림 · ${won(r.rent*st)}원</div>`;
    else      arrears=`<div class="arrears one">${warnIcon}이번 달 미납</div>`;
  }
  return `<div class="card ${stateCls}" data-room="${r.id}">
    <div class="stripe"></div>
    <div class="roomno"><div class="no">${esc(r.no)}</div><div class="ty">${esc(r.type)}</div></div>
    <div class="cardmid">
      <div class="nm">${r.vacant?`<span class="vacbadge">공실</span>`:esc(r.tenant)}</div>
      ${r.vacant?'':`<div class="rent tnum">월 ${won(r.rent)}원 <span class="dep">보증 ${won(r.deposit)}</span></div>`}
      ${arrears}
      ${meta.length?`<div class="meta">${meta.join('')}</div>`:''}
    </div>
    ${payBtn}
  </div>`;
}

function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================================================
   동작
   ============================================================ */
async function togglePay(roomId){
  const f=findRoom(roomId); if(!f||f.room.vacant) return;
  const r=f.room;
  if(!r.payments) r.payments={};
  if(isPaid(r,selMonth)){
    delete r.payments[selMonth];
  }else{
    r.payments[selMonth]={paid:true, date: ymOfDate(new Date())===selMonth ? new Date().toISOString().slice(0,10) : selMonth+'-01'};
  }
  await saveState();
  render();
}

/* ---- 백업 ---- */
function exportBackup(){
  const data=JSON.stringify(state,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`원룸관리_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  closeSheet(); toast('백업 파일을 저장했어요');
}
function importBackup(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const obj=JSON.parse(reader.result);
      if(!obj.buildings) throw new Error('형식이 올바르지 않아요');
      if(!confirm('현재 데이터를 덮어쓰고 복원할까요?')) return;
      const keepPin=state.pin; state=obj; state.pin=state.pin||keepPin;
      await saveState(); closeSheet(); render(); toast('복원이 완료됐어요');
    }catch(e){ toast('불러오기에 실패했어요'); }
  };
  reader.readAsText(file);
}

const lock=document.getElementById('lockScreen');
let pinMode='unlock';   // unlock | set | confirm | change-old | change-new | change-confirm
let pinBuf='', pinFirst='', pinErrCount=0;

function buildKeypad(){
  const kp=document.getElementById('keypad');
  const keys=['1','2','3','4','5','6','7','8','9','','0','del'];
  kp.innerHTML=keys.map(k=>{
    if(k==='') return `<div></div>`;
    if(k==='del') return `<div class="key fn" data-k="del">⌫</div>`;
    return `<div class="key" data-k="${k}">${k}</div>`;
  }).join('');
  kp.querySelectorAll('.key').forEach(el=>el.onclick=()=>onKey(el.dataset.k));
}
function renderDots(){
  const d=document.getElementById('pinDots');

function lockUI(title,sub){

  document.getElementById('lockSub').textContent=sub;

function shakeDots(){
  document.querySelectorAll('.pinDot').forEach(d=>d.classList.add('err'));
  setTimeout(()=>{ pinBuf=''; renderDots(); document.querySelectorAll('.pinDot').forEach(d=>d.classList.remove('err')); },500);

async function onKey(k){
  if(k==='del'){ pinBuf=pinBuf.slice(0,-1); renderDots(); return; }
  if(pinBuf.length>=4) return;
  pinBuf+=k; renderDots();
  if(pinBuf.length===4) setTimeout(handlePin,120);
}

async function handlePin(){
  const entered=pinBuf;
  if(pinMode==='set'){ pinFirst=entered; pinBuf=''; renderDots(); pinMode='confirm'; lockUI('비밀번호 설정','한 번 더 입력하세요'); return; }
  if(pinMode==='confirm'){
    if(entered!==pinFirst){ pinBuf=''; pinFirst=''; pinMode='set'; lockUI('비밀번호 설정','숫자 4자리를 정하세요'); document.getElementById('lockHint').textContent='일치하지 않아요. 다시 정해주세요'; shakeDots(); return; }
    const salt=randSalt(); state.pin={salt,hash:await sha256(entered+salt)}; await saveState(); enterApp(); return;
  }
  if(pinMode==='unlock'){
    const ok=await sha256(entered+state.pin.salt)===state.pin.hash;
    if(ok){ enterApp(); } else { pinErrCount++; shakeDots(); document.getElementById('lockHint').textContent='비밀번호가 틀렸어요'; }
    return;
  }
  if(pinMode==='change-old'){
    const ok=await sha256(entered+state.pin.salt)===state.pin.hash;
    if(ok){ pinBuf=''; renderDots(); pinMode='change-new'; lockUI('새 비밀번호','새 4자리를 정하세요'); }
    else{ shakeDots(); document.getElementById('lockHint').textContent='현재 비밀번호가 틀렸어요'; }
    return;
  }
  if(pinMode==='change-new'){ pinFirst=entered; pinBuf=''; renderDots(); pinMode='change-confirm'; lockUI('새 비밀번호','한 번 더 입력하세요'); return; }
  if(pinMode==='change-confirm'){
    if(entered!==pinFirst){ pinBuf=''; pinMode='change-new'; lockUI('새 비밀번호','새 4자리를 정하세요'); document.getElementById('lockHint').textContent='일치하지 않아요'; shakeDots(); return; }
    const salt=randSalt(); state.pin={salt,hash:await sha256(entered+salt)}; await saveState(); enterApp(); toast('비밀번호가 변경됐어요'); return;
  }
}

function startChangePin(){
  lock.hidden=false; document.getElementById('mainScreen').hidden=true;
  pinBuf=''; pinFirst=''; pinMode='change-old'; renderDots(); lockUI('비밀번호 변경','현재 비밀번호를 입력하세요');
}
function enterApp(){
  lock.hidden=true; document.getElementById('mainScreen').hidden=false;
  pinBuf=''; render();
}

/* ============================================================
   부팅
   ============================================================ */
async function boot(){
  buildKeypad(); renderDots();
  try{
    db=await Promise.race([
      openDB(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3000))
    ]);
  }catch(e){
    memMode=true; console.warn('IndexedDB 사용 불가 → 메모리 모드로 동작합니다.', e);
  }
  state=await dbGet(KEY);
  if(!state){ state=seedState(); await saveState(); }
  // PIN 잠금 없이 바로 앱으로 진입한다. (데이터는 100% 로컬 저장)
  enterApp();
  if(memMode){
    toast('미리보기 환경은 저장이 안 돼요. 배포 사이트에서 쓰세요');
  }
}

/* 메인 화면 버튼 바인딩 */
document.getElementById('menuBtn').onclick=openMenu;
document.getElementById('addRoomFab').onclick=()=>openRoomEdit(null);
document.getElementById('prevM').onclick=()=>{ const[y,m]=selMonth.split('-').map(Number); const d=new Date(y,m-2,1); selMonth=ymOfDate(d); render(); };
document.getElementById('nextM').onclick=()=>{ const[y,m]=selMonth.split('-').map(Number); const d=new Date(y,m,1); selMonth=ymOfDate(d); render(); };
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ filter=c.dataset.f; render(); });

boot();
</script>
